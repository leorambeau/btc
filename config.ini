# Configuration BTC HFT Visualizer

[WebSocket]
URI = wss://stream.binance.com:9443/ws/btcusdt@ticker
RECONNECT_DELAY_BASE = 1
RECONNECT_DELAY_MAX = 30

[Visualization]
MAX_POINTS = 100
UPDATE_INTERVAL_MS = 50
TARGET_FPS = 60
DARK_MODE = true

[GUI - PyQtGraph]
WIDTH = 1200
HEIGHT = 700
LINE_WIDTH = 3
LINE_COLOR = #00ff41
GRID_ALPHA = 0.2

[GUI - Plotly]
HEIGHT = 600
PLOT_BG = #0d1117
PAPER_BG = #0d1117
GRID_COLOR = #21262d

[Data Collection]
CSV_PATH = btc_data_log.csv
CSV_BUFFER_SIZE = 10
CSV_FLUSH_INTERVAL_S = 5

[ML Training]
LOOKBACK_WINDOW = 20
TRAIN_TEST_SPLIT = 0.8
RF_N_ESTIMATORS = 100
RF_MAX_DEPTH = 15

[Benchmark]
BENCHMARK_DURATION_S = 30
LOG_RESULTS = true
RESULTS_FILE = benchmark_results.csv
